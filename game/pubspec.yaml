name: game
description: "Time Slip Expedition Game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  google_mobile_ads: ^5.2.0
  flutter:
    sdk: flutter
  flame: ^1.13.0
  flame_spine: ^0.3.0+1
  get_it: 9.2.1
  equatable: ^2.0.5
  mg_common_game:
    path: ../../../libs/mg_common_game
