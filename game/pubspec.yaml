name: game
description: "Time Slip Expedition Game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  provider: ^6.0.0
  # google_mobile_ads: ^7.0.0  # Disabled due to manifest merger conflict with Firebase
  flutter:
    sdk: flutter
  flame: ^1.13.0
  flame_spine: ^0.3.0+1
  get_it: 9.2.1
  equatable: ^2.0.5
  mg_common_game:
    path: ../libs/mg_common_game
  cupertino_icons: ^1.0.8

  shared_preferences: ^2.5.4
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  firebase_remote_config: ^6.3.0
  # firebase_analytics: ^12.2.0  # Disabled due to manifest merger conflict with google_mobile_ads
  firebase_messaging: ^16.1.3
dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/audio/sfx/
    - assets/audio/bgm/
    - assets/spine/
